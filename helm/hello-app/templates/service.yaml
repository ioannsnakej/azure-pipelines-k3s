apiVersion: v1
kind: Service
metadata:
  name: {{ include "hello-app.fullname" . }}
spec:
  selector:
    app: {{ include "hello-app.name" . }}
  ports:
  - protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    nodePort: {{ .Values.service.nodePort }}
  type: {{ .Values.service.type }}